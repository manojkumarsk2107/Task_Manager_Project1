<!DOCTYPE html>
<html>
<head>
    <title>My Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>
                {{ employee_name }} - My Tasks
            </h3>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>
                        <th>Task</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>AI Score</th>
                        <th>Action</th>
                    </tr>

                </thead>

                <tbody>

                {% for task in tasks %}

                <tr>

                    <td>{{ task.title }}</td>

                    <td>{{ task.priority }}</td>

                    <td>{{ task.status }}</td>

                    <td>{{ task.assignment_score }}</td>

                    <td>

                        <a
                        href="/employee/task/{{ task.task_id }}/update/?status=Pending"
                        class="btn btn-secondary btn-sm">

                        Pending

                        </a>

                        <a
                        href="/employee/task/{{ task.task_id }}/update/?status=In Progress"
                        class="btn btn-warning btn-sm">

                        Progress

                        </a>

                        <a
                        href="/employee/task/{{ task.task_id }}/update/?status=Completed"
                        class="btn btn-success btn-sm">

                        Complete

                        </a>

                    </td>

                </tr>

                {% empty %}

                <tr>

                    <td colspan="5">

                        No tasks assigned.

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
