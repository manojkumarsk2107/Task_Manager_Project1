<!DOCTYPE html>
<html>
<head>
    <title>All Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            <h3>All Tasks</h3>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>
                        <th>Task</th>
                        <th>Employee</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>AI Score</th>
                    </tr>

                </thead>

                <tbody>

                {% for task in tasks %}

                    <tr>

                        <td>{{ task.title }}</td>

                        <td>{{ task.assigned_employee }}</td>

                        <td>{{ task.priority }}</td>

                        <td>{{ task.status }}</td>

                        <td>{{ task.assignment_score }}</td>

                    </tr>

                {% empty %}

                    <tr>
                        <td colspan="5">
                            No tasks available.
                        </td>
                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
