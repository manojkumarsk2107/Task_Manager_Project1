<!DOCTYPE html>
<html>
<head>
    <title>All Tasks</title>
</head>
<body>

<h1>All Tasks</h1>

<hr>

{% for task in tasks %}

<h3>{{ task.title }}</h3>

<p>
Assigned Employee:
{{ task.assigned_employee }}
</p>

<p>
Priority:
{{ task.priority }}
</p>

<p>
Status:
{{ task.status }}
</p>

<p>
AI Score:
{{ task.assignment_score }}
</p>

<hr>

{% empty %}

<p>No tasks available.</p>

{% endfor %}

</body>
</html>
